<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#27272a" stroke-width="2"/>

  <!-- Chip group - left chip -->
  <g transform="translate(340, 280)">
    <circle cx="0" cy="0" r="72" fill="#e53e3e" stroke="#fff" stroke-width="5"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <!-- Dashes around edge -->
    <g stroke="#fff" stroke-width="4" opacity="0.5">
      <line x1="0" y1="-72" x2="0" y2="-62"/>
      <line x1="0" y1="72" x2="0" y2="62"/>
      <line x1="-72" y1="0" x2="-62" y2="0"/>
      <line x1="72" y1="0" x2="62" y2="0"/>
      <line x1="-51" y1="-51" x2="-44" y2="-44"/>
      <line x1="51" y1="-51" x2="44" y2="-44"/>
      <line x1="-51" y1="51" x2="-44" y2="44"/>
      <line x1="51" y1="51" x2="44" y2="44"/>
    </g>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="bold" fill="#fff">$</text>
  </g>

  <!-- Center chip (larger, main focus) -->
  <g transform="translate(480, 260)">
    <circle cx="0" cy="0" r="90" fill="#2563eb" stroke="#fff" stroke-width="6"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <g stroke="#fff" stroke-width="5" opacity="0.5">
      <line x1="0" y1="-90" x2="0" y2="-78"/>
      <line x1="0" y1="90" x2="0" y2="78"/>
      <line x1="-90" y1="0" x2="-78" y2="0"/>
      <line x1="90" y1="0" x2="78" y2="0"/>
      <line x1="-64" y1="-64" x2="-55" y2="-55"/>
      <line x1="64" y1="-64" x2="55" y2="-55"/>
      <line x1="-64" y1="64" x2="-55" y2="55"/>
      <line x1="64" y1="64" x2="55" y2="55"/>
    </g>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" fill="#fff">$</text>
  </g>

  <!-- Right chip -->
  <g transform="translate(600, 300)">
    <circle cx="0" cy="0" r="66" fill="#16a34a" stroke="#fff" stroke-width="5"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <g stroke="#fff" stroke-width="4" opacity="0.5">
      <line x1="0" y1="-66" x2="0" y2="-56"/>
      <line x1="0" y1="66" x2="0" y2="56"/>
      <line x1="-66" y1="0" x2="-56" y2="0"/>
      <line x1="66" y1="0" x2="56" y2="0"/>
      <line x1="-47" y1="-47" x2="-40" y2="-40"/>
      <line x1="47" y1="-47" x2="40" y2="-40"/>
      <line x1="-47" y1="47" x2="-40" y2="40"/>
      <line x1="47" y1="47" x2="40" y2="40"/>
    </g>
    <text x="0" y="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#fff">$</text>
  </g>

  <!-- App title -->
  <text x="780" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="#fafafa" letter-spacing="-1">
    Poker Chip
  </text>
  <text x="780" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="#fafafa" letter-spacing="-1">
    Calculator
  </text>

  <!-- Subtitle -->
  <text x="780" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a1a1aa">
    BB換算を即座に計算
  </text>

  <!-- Bottom accent line -->
  <rect x="100" y="560" width="1000" height="2" rx="1" fill="#e53e3e" opacity="0.6"/>
</svg>
