<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#09090b"/>
  <!-- Chip outer -->
  <circle cx="256" cy="256" r="192" fill="#e53e3e" stroke="#fff" stroke-width="12"/>
  <!-- Edge notches (casino chip style) -->
  <g stroke="#fff" stroke-width="12" stroke-linecap="round">
    <line x1="256" y1="52" x2="256" y2="82"/>
    <line x1="256" y1="430" x2="256" y2="460"/>
    <line x1="52" y1="256" x2="82" y2="256"/>
    <line x1="430" y1="256" x2="460" y2="256"/>
    <line x1="111.7" y1="111.7" x2="132.9" y2="132.9"/>
    <line x1="379.1" y1="379.1" x2="400.3" y2="400.3"/>
    <line x1="111.7" y1="400.3" x2="132.9" y2="379.1"/>
    <line x1="379.1" y1="132.9" x2="400.3" y2="111.7"/>
  </g>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="128" fill="none" stroke="#fff" stroke-width="8"/>
  <!-- Dollar sign -->
  <text x="256" y="288" text-anchor="middle" font-size="128" font-weight="bold" fill="#fff" font-family="Arial, sans-serif">$</text>
</svg>
